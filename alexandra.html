<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>E-Card about Alexandra Trusova </title>
        <link rel="stylesheet" href="./alexandra.css">
    </head>
    <body>
        <div class="container">
            <div class="envelope-wrapper">
                <div class="envelope">
                    <div class="letter">
                        <div class="text">
                            <strong>Alexandra Trusova</strong>
                            <p>Watching Alexandra push limits on the ice, I learned that fear is no match for courage.
                              Every jump she lands, every record she breaks, reminds me that dreams are worth chasing no matter the risk.
Alexandra showed me that daring to try is already winning.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="heart"></div>
            </div>
        </div>
        <script>
            const envelope = document.querySelector('.envelope-wrapper');
            envelope.addEventListener('click',() => {
                envelope.classList.toggle('flap');
            });
        </script>
    </body>
</html>
