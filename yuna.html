<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Card for Yuna Kim</title>
        <link rel="stylesheet" href="./yuna.css">
    </head>
    <body>
        <div class="container">
            <div class="envelope-wrapper">
                <div class="envelope">
                    <div class="letter">
                        <div class="text">
                            <strong>Yuna Kim</strong>
                            <p>Watching Yuna glide on the ice felt like seeing poetry in motion.
She taught me that grace is not just in skill, but in the heart you put into everything you love.
Yuna showed me that passion makes the world pause and watch.
                            </p>
                        </div>
                    </div>
                </div>
                 <div class="heart"></div>
            </div>
        </div>
        <script>
            const envelope = document.querySelector('.envelope-wrapper');
            envelope.addEventListener('click',() => {
                envelope.classList.toggle('flap');
            });
        </script>
    </body>
</html>
