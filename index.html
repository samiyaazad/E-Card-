<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>ICE SKATING : the inspiration </title>
    </head>
    <body>
        <div class="wrapper">
            <div class="container">
                <input type="radio" name="slide" id="c1" checked>
                <label for="c1" class="card">
                    <div class="row">
                        <div class="icon">1</div>
                        <div class="description">
                            <h4>Yuzuru Hanyu</h4>
                            <p>Everytime I saw him on the ice 
                                I felt how it feels to do something you really love 
                            </p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide" id="c2" >
                <label for="c2" class="card">
                    <div class="row">
                        <div class="icon">2</div>
                        <div class="description">
                            <h4>Anna Stanislavovna Shcherbakova</h4>
                            <p>She taught me to give my best self everytime 
                                specially when everyone is doubting
                            </p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide" id="c3">
                <label for="c3" class="card">
                    <div class="row">
                        <div class="icon">3</div>
                        <div class="description">
                            <h4>Alexandra Trusova</h4>
                            <p>Her competitive mindset helped me to
                                win in so many situation , I couldn't even count
                            </p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide" id="c4">
                <label for="c4" class="card">
                    <div class="row">
                        <div class="icon">4</div>
                        <div class="description">
                            <h4>Yuna Kim</h4>
                            <p>I learnt most important thing of my life from her
                                that is sometimes you have keep improving to win the medal
                            </p>
                        </div>
                    </div>
                </label>
            </div>
        </div>
    </body>
</html>
